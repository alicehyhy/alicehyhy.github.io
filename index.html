<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alicehyhy</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>
<div class="logo">アリスハイハイ</div>
</header>

<section class="gallery">

<h2>📸写真</h2>

<div class="upload">
<input type="file" id="uploadImage" hidden>
<label for="uploadImage" class="btn">📁 写真を選択してください</label>
<button class="btn" onclick="uploadImage()">アップロード</button>
</div>

<div class="pinterest" id="gallery"></div>

</section>

<div class="modal" id="imageModal">
<img id="modalImg">
</div>

<section class="chat">

<h2>💬 メッセージを残してください</h2>

<input id="nameInput" placeholder="あなたの名前">

<textarea id="textInput" rows="3" placeholder="メッセージを書いてください"></textarea>

<div class="chat-tools">

<button class="btn" onclick="addEmoji()">😀</button>

<input type="file" id="chatImage" hidden>
<label for="chatImage" class="btn">🖼</label>

<button class="btn" onclick="clearChat()">🧹</button>

<button class="btn" onclick="sendMessage()">🚀</button>

</div>

</section>

<div id="messages"></div>

<script src="js/script.js"></script>

</body>
</html>
