<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alicehyhy</title>

<style>

/* BODY */

body{
margin:0;
font-family:Arial;
background:#0d1117;
color:#c9d1d9;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#161b22;
border-bottom:1px solid #30363d;
}

.logo{
font-size:22px;
font-weight:bold;
color:#ff4da6;
}

/* GALLERY */

.gallery{
max-width:1200px;
margin:auto;
padding:20px;
text-align:center;
}

.pinterest{
column-count:4;
column-gap:15px;
}

@media(max-width:900px){ .pinterest{column-count:3;} }
@media(max-width:600px){ .pinterest{column-count:2;} }

.card{
break-inside:avoid;
background:#161b22;
border-radius:12px;
margin-bottom:15px;
overflow:hidden;
border:1px solid #30363d;
position:relative;
}

.card img{
width:100%;
cursor:pointer;
}

.heart{
position:absolute;
top:10px;
right:10px;
background:#00000080;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
}

/* COMMENT */

.comment-box{
padding:10px;
}

.comment-box input{
width:70%;
background:#0d1117;
border:1px solid #30363d;
color:white;
padding:6px;
border-radius:6px;
}

.comment-box button{
background:#2a2a2a;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* UPLOAD */

.upload{
margin:20px;
display:flex;
gap:10px;
justify-content:center;
}

.btn{
background:#2a2a2a;
border:none;
padding:8px 14px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000cc;
align-items:center;
justify-content:center;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* CHAT */

.chat{
max-width:600px;
margin:40px auto;
background:#161b22;
padding:20px;
border-radius:12px;
border:1px solid #30363d;
}

.chat input,
.chat textarea{
width:100%;
background:#0d1117;
border:1px solid #30363d;
color:white;
padding:8px;
border-radius:6px;
margin-bottom:10px;
}

.chat-tools{
display:flex;
gap:10px;
}

/* MESSAGES */

#messages{
max-width:700px;
margin:30px auto;
}

.message{
display:flex;
gap:10px;
padding:10px;
border-bottom:1px solid #30363d;
}

.avatar{
width:40px;
height:40px;
background:#5865f2;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

.msg-image{
max-width:200px;
margin-top:5px;
border-radius:8px;
}

.react{
cursor:pointer;
margin-top:5px;
}

</style>

</head>

<body>

<header>
<div class="logo">アリスハイハイ</div>
</header>

<!-- GALLERY -->

<section class="gallery">

<h2>📸写真</h2>

<div class="upload">
<input type="file" id="uploadImage" hidden>
<label for="uploadImage" class="btn">📁 写真を選択してください</label>
<button class="btn" onclick="uploadImage()">アップロード</button>
</div>

<div class="pinterest" id="gallery"></div>

</section>

<!-- IMAGE MODAL -->

<div class="modal" id="imageModal">
<img id="modalImg">
</div>

<!-- CHAT -->

<section class="chat">

<h2>💬 メッセージを残してください</h2>

<input id="name" placeholder="あなたの名前">
<textarea id="text" rows="3" placeholder="メッセージを書いてください"></textarea>

<div class="chat-tools">

<button class="btn" onclick="addEmoji()">😀</button>

<input type="file" id="chatImage" hidden>
<label for="chatImage" class="btn">🖼</label>

<button class="btn" onclick="clearChat()">🧹</button> <button class="btn" onclick="sendMessage()">🚀</button>

</div>

</section>

<div id="messages"></div>

<script>

/* IMAGE UPLOAD */

function uploadImage(){

let file=document.getElementById("uploadImage").files[0]
if(!file) return

let reader=new FileReader()

reader.onload=function(e){

let gallery=document.getElementById("gallery")

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="heart" onclick="likeImage(this)">❤️</div>
<img src="${e.target.result}" onclick="openImage(this)">
<div class="comment-box">
<input class="comment-input">
<button onclick="addComment(this)">💬</button>
<div class="comments"></div>
</div>
`

gallery.prepend(card)

saveGallery()

}

reader.readAsDataURL(file)

}

/* COMMENT */

function addComment(btn){

let box=btn.parentElement
let input=box.querySelector(".comment-input")
let list=box.querySelector(".comments")

if(input.value==="") return

let p=document.createElement("p")
p.textContent="💬 "+input.value
list.appendChild(p)

input.value=""

saveGallery()

}

/* LIKE */

function likeImage(el){

el.innerHTML=el.innerHTML==="❤️"?"💖":"❤️"

}

/* IMAGE ZOOM */

function openImage(img){

let modal=document.getElementById("imageModal")
let modalImg=document.getElementById("modalImg")

modal.style.display="flex"
modalImg.src=img.src

}

document.getElementById("imageModal").onclick=()=>imageModal.style.display="none"

/* CHAT */

document.getElementById("text").addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault()
sendMessage()
}
})

function addEmoji(){

let emojis=["😀","😂","😍","🥰","🔥","❤️"]
let e=emojis[Math.floor(Math.random()*emojis.length)]

text.value+=e

}

function sendMessage(){

let name=nameInput.value||"Guest"
let text=textInput.value
let img=document.getElementById("chatImage").files[0]

if(!text && !img) return

let time=new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

let reader=new FileReader()

reader.onload=function(e){

let msg={
name:name,
text:text,
img:e.target.result,
time:time
}

saveMessage(msg)
addMessage(msg)

}

if(img) reader.readAsDataURL(img)
else{

let msg={name,text,img:null,time}
saveMessage(msg)
addMessage(msg)

}

textInput.value=""
chatImage.value=""

}

function addMessage(msg){

messages.innerHTML+=`
<div class="message">

<div class="avatar">${msg.name[0]}</div>

<div>
<b>${msg.name}</b> ${msg.time}
<div>${msg.text||""}</div>
${msg.img?`<img src="${msg.img}" class="msg-image">`:""}
<div class="react" onclick="react(this)">❤️</div>
</div>

</div>
`

}

function react(el){

el.innerHTML=el.innerHTML==="❤️"?"💖":"❤️"

}

/* STORAGE */

function saveMessage(msg){

let chat=JSON.parse(localStorage.getItem("chat")||"[]")
chat.push(msg)
localStorage.setItem("chat",JSON.stringify(chat))

}

function loadChat(){

let chat=JSON.parse(localStorage.getItem("chat")||"[]")
chat.forEach(addMessage)

}

function clearChat(){

if(confirm("Xoá toàn bộ chat?")){
localStorage.removeItem("chat")
messages.innerHTML=""
}

}

/* GALLERY SAVE */

function saveGallery(){

localStorage.setItem("gallery",gallery.innerHTML)

}

function loadGallery(){

let data=localStorage.getItem("gallery")
if(data) gallery.innerHTML=data

}

loadChat()
loadGallery()

</script>

</body>
</html>
