<!DOCTYPE html>

<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alicehyhy</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- CHAT BUTTON -->

<div id="chatButton" onclick="toggleChat()">
<img src="images/chat.png">
</div>

<header>

<div class="logo">アリスハイハイ</div>

<div class="header-right">

<button id="createBtn" class="create-btn github-btn" onclick="openSignup()">

Account </button>

<div class="account-area">

<img id="userAvatar" src="images/avatar.jpg" class="header-avatar">

<button id="logoutBtn" onclick="logout()">Logout</button>

</div>

</div>

</header>

<!-- GALLERY -->

<section class="gallery">

<h2>📸 写真</h2>

<div class="upload">

<input type="file" id="uploadImage" hidden>

<label for="uploadImage" class="btn">
📁 写真を選択してください
</label>

<button class="btn" onclick="uploadImage()">
アップロード
</button>

</div>

<div class="pinterest" id="gallery"></div>

</section>

<!-- IMAGE MODAL -->

<div class="modal" id="imageModal">
<img id="modalImg">
</div>

<!-- CHAT BOX -->

<div id="chatBox">

<div class="chat-header">
💬 メッセージ
</div>

<div id="messages" class="discord-messages"></div>

<div class="chat-input">

<textarea id="textInput" placeholder="メッセージを書いてください"></textarea>

<div class="chat-tools">

<button onclick="addEmoji()">😀</button>

<input type="file" id="chatImage" hidden>
<label for="chatImage">🖼</label>

<button onclick="clearChat()">🧹</button>

<button onclick="sendMessage()">➤</button>

</div>

</div>

</div>

<!-- ACCOUNT MODAL -->

<div class="signup-modal" id="signupModal">

<div class="signup-box" id="signupBox">

<div class="window-controls">
<div class="dot green" onclick="closeSignup()"></div>
<div class="dot yellow" onclick="closeSignup()"></div>
<div class="dot red" onclick="closeSignup()"></div>
</div>

<img class="avatar-login" src="images/avatar.jpg">

<h2 id="authTitle">Account</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<div id="authMessage"></div>

<button class="register-btn github-btn" onclick="register()">Create Account</button>

<button class="login-btn" onclick="login()">Login</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="js/script.js"></script>

</body>
</html>
